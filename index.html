<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كأس شهداء المنصورية - نظام إدارة البطولة</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        :root {
            --primary-color: #0078d4;
            --primary-dark: #005a9e;
            --accent-color: #50b9ff;
            --danger-color: #d13438;
            --success-color: #0b8a3e;
            --warning-color: #ffaa44;
            --bg-gray: #f5f5f5;
            --bg-white: #ffffff;
            --text-dark: #1b1b1b;
            --text-gray: #605e5c;
            --border-color: #e1dfdd;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 8px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 16px rgba(0,0,0,0.16);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }
        
        body {
            background: var(--bg-gray);
            color: var(--text-dark);
            min-height: 100vh;
        }
        
        .top-nav {
            background: var(--primary-color);
            color: white;
            padding: 0 20px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .nav-brand {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-brand i {
            font-size: 1.8rem;
        }
        
        .nav-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .nav-user span {
            font-weight: 500;
        }
        
        .btn-logout {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
        
        .btn-logout:hover {
            background: rgba(255,255,255,0.35);
        }
        
        .app-container {
            display: flex;
            min-height: calc(100vh - 56px);
        }
        
        .sidebar {
            width: 260px;
            background: var(--bg-white);
            border-left: 1px solid var(--border-color);
            padding: 20px 0;
            box-shadow: var(--shadow-sm);
        }
        
        .sidebar-menu {
            list-style: none;
        }
        
        .sidebar-menu li {
            padding: 12px 20px;
            margin: 4px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            color: var(--text-dark);
        }
        
        .sidebar-menu li:hover {
            background: #f0f0f0;
        }
        
        .sidebar-menu li.active {
            background: #e6f2fc;
            color: var(--primary-color);
            font-weight: 600;
        }
        
        .sidebar-menu li i {
            width: 24px;
            text-align: center;
            font-size: 1.1rem;
        }
        
        .main-content {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
        }
        
        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: var(--text-dark);
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: 22px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 18px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border-right: 4px solid transparent;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }
        
        .stat-card.teams { border-right-color: var(--primary-color); }
        .stat-card.matches { border-right-color: var(--success-color); }
        .stat-card.players { border-right-color: var(--warning-color); }
        .stat-card.scorers { border-right-color: var(--danger-color); }
        
        .card-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }
        
        .card-icon.blue { background: var(--primary-color); }
        .card-icon.green { background: var(--success-color); }
        .card-icon.orange { background: var(--warning-color); }
        .card-icon.red { background: var(--danger-color); }
        
        .card-info h3 {
            font-size: 0.9rem;
            color: var(--text-gray);
            margin-bottom: 4px;
        }
        
        .card-info .number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
        }
        
        .section-card {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: 22px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 25px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .section-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .btn-success {
            background: var(--success-color);
            color: white;
        }
        
        .btn-danger {
            background: var(--danger-color);
            color: white;
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }
        
        .btn-outline:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        table th, table td {
            padding: 12px 14px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }
        
        table th {
            background: #fafafa;
            font-weight: 600;
            color: var(--text-gray);
            font-size: 0.85rem;
            white-space: nowrap;
        }
        
        table tbody tr:hover {
            background: #f8fafd;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-dark);
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .form-row.three {
            grid-template-columns: 1fr 1fr 1fr;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 30px;
            width: 90%;
            max-width: 550px;
            box-shadow: var(--shadow-lg);
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal h3 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--text-gray);
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .today-matches {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .match-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-md);
            transition: transform 0.2s;
        }
        
        .match-card:hover {
            transform: translateY(-3px);
        }
        
        .match-teams {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 15px 0;
        }
        
        .match-team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .team-code {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
        }
        
        .match-vs {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-color);
        }
        
        .match-score {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 10px 0;
            letter-spacing: 8px;
        }
        
        .match-meta {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
        }
        
        .match-status {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-live {
            background: var(--danger-color);
            animation: pulse 1.5s infinite;
        }
        
        .status-upcoming {
            background: var(--primary-color);
        }
        
        .status-finished {
            background: var(--success-color);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-gray);
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            background: transparent;
            font-size: 0.9rem;
        }
        
        .tab.active {
            background: var(--bg-white);
            box-shadow: var(--shadow-sm);
            color: var(--primary-color);
        }
        
        .login-screen {
            min-height: 100vh;
            display: none;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #1a1a2e, #16213e);
        }
        
        .login-screen.active {
            display: flex;
        }
        
        .login-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }
        
        .login-logo {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            margin: 0 auto 20px;
        }
        
        .login-card h2 {
            margin-bottom: 8px;
            font-size: 1.5rem;
        }
        
        .login-card p {
            color: var(--text-gray);
            margin-bottom: 25px;
        }
        
        .login-type-selector {
            display: flex;
            gap: 4px;
            background: var(--bg-gray);
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .login-type {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            background: transparent;
            font-weight: 500;
        }
        
        .login-type.active {
            background: white;
            box-shadow: var(--shadow-sm);
        }
        
        .login-error {
            color: var(--danger-color);
            margin-top: 10px;
            font-size: 0.85rem;
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-gray);
        }
        
        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-success { background: #d4f5dd; color: var(--success-color); }
        .badge-warning { background: #fff3d6; color: #8a6d14; }
        .badge-danger { background: #fde7e7; color: var(--danger-color); }
        .badge-info { background: #d6edff; color: var(--primary-color); }
        
        .alert-box {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 3000;
            display: none;
            box-shadow: var(--shadow-lg);
        }
        
        .alert-success { background: var(--success-color); }
        .alert-error { background: var(--danger-color); }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            .sidebar-menu li span {
                display: none;
            }
            .sidebar-menu li {
                justify-content: center;
                padding: 14px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .form-row.three {
                grid-template-columns: 1fr 1fr;
            }
            .cards-grid {
                grid-template-columns: 1fr 1fr;
            }
            .today-matches {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .form-row.three {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<!-- تنبيه -->
<div class="alert-box" id="alertBox"></div>

<!-- شاشة تسجيل الدخول -->
<div class="login-screen active" id="loginScreen">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-futbol"></i>
        </div>
        <h2>كأس شهداء المنصورية</h2>
        <p>نظام إدارة البطولة</p>
        
        <div class="login-type-selector" id="loginTypeSelector">
            <button class="login-type active" data-type="admin">أدمن</button>
            <button class="login-type" data-type="coach">مدرب</button>
            <button class="login-type" data-type="public">جمهور</button>
        </div>
        
        <form id="loginForm">
            <div class="form-group" id="loginUsernameGroup">
                <label for="loginUsername">اسم المستخدم</label>
                <input type="text" id="loginUsername" required>
            </div>
            <div class="form-group" id="loginPasswordGroup">
                <label for="loginPassword">كلمة المرور</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
                <i class="fas fa-sign-in-alt"></i> دخول
            </button>
        </form>
        <p class="login-error" id="loginError"></p>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div class="hidden" id="mainApp">
    
    <nav class="top-nav">
        <div class="nav-brand">
            <i class="fas fa-trophy"></i>
            كأس شهداء المنصورية
        </div>
        <div class="nav-user">
            <span id="currentUserName">مرحباً</span>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> خروج
            </button>
        </div>
    </nav>
    
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <ul class="sidebar-menu" id="sidebarMenu">
            </ul>
        </aside>
        
        <main class="main-content" id="mainContent">
        </main>
    </div>
</div>

<!-- المودال -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent">
    </div>
</div>
<script>
    // ==================== إعدادات Firebase ====================
    const firebaseConfig = {
        apiKey: "AIzaSyQ0bwvHx1gofhUoB3XGdkuhcBe---GnG98",
        authDomain: "smartteacherhub.firebaseapp.com",
        databaseURL: "https://smartteacherhub-default-rtdb.firebaseio.com",
        projectId: "smartteacherhub",
        storageBucket: "smartteacherhub.firebasestorage.app",
        messagingSenderId: "151352147937",
        appId: "1:151352147937:web:325d72abc475b592cc69caa"
    };
    
    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // ==================== متغيرات عامة ====================
    let currentUser = null;
    let currentUserType = null;
    let currentCoachTeam = null;
    let currentSection = 'dashboard';
    let allTeams = [];
    let allMatches = [];
    let allPlayers = [];
    let allCoaches = [];
    
    // ==================== دوال التنبيه ====================
    function showAlert(message, type = 'success') {
        const alertBox = document.getElementById('alertBox');
        alertBox.textContent = message;
        alertBox.className = 'alert-box alert-' + type;
        alertBox.style.display = 'block';
        setTimeout(() => {
            alertBox.style.display = 'none';
        }, 3000);
    }
    
    // ==================== دوال تسجيل الدخول ====================
    const loginScreen = document.getElementById('loginScreen');
    const mainApp = document.getElementById('mainApp');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const loginTypeSelector = document.getElementById('loginTypeSelector');
    const loginUsernameGroup = document.getElementById('loginUsernameGroup');
    const loginPasswordGroup = document.getElementById('loginPasswordGroup');
    
    let selectedLoginType = 'admin';
    
    // تبديل نوع تسجيل الدخول
    loginTypeSelector.addEventListener('click', (e) => {
        if (e.target.classList.contains('login-type')) {
            document.querySelectorAll('.login-type').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            selectedLoginType = e.target.dataset.type;
            
            if (selectedLoginType === 'public') {
                loginUsernameGroup.classList.add('hidden');
                loginPasswordGroup.classList.add('hidden');
            } else {
                loginUsernameGroup.classList.remove('hidden');
                loginPasswordGroup.classList.remove('hidden');
            }
        }
    });
    
    // معالجة تسجيل الدخول
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginError.style.display = 'none';
        
        // دخول الجمهور
        if (selectedLoginType === 'public') {
            currentUserType = 'public';
            currentUser = { name: 'زائر' };
            showMainApp();
            return;
        }
        
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        if (!username || !password) {
            loginError.textContent = 'الرجاء إدخال اسم المستخدم وكلمة المرور';
            loginError.style.display = 'block';
            return;
        }
        
        // دخول الأدمن
        if (selectedLoginType === 'admin') {
            if (username === 'admin' && password === 'mansouriya2024') {
                currentUserType = 'admin';
                currentUser = { name: 'مدير البطولة' };
                showMainApp();
            } else {
                loginError.textContent = 'بيانات الدخول غير صحيحة';
                loginError.style.display = 'block';
            }
            return;
        }
        
        // دخول المدرب
        if (selectedLoginType === 'coach') {
            try {
                const coachQuery = await db.collection('coaches')
                    .where('username', '==', username)
                    .where('password', '==', password)
                    .get();
                
                if (!coachQuery.empty) {
                    const coachData = coachQuery.docs[0].data();
                    currentUserType = 'coach';
                    currentUser = { name: coachData.name, id: coachQuery.docs[0].id };
                    currentCoachTeam = coachData.teamCode;
                    showMainApp();
                } else {
                    loginError.textContent = 'بيانات المدرب غير صحيحة';
                    loginError.style.display = 'block';
                }
            } catch (error) {
                console.error('خطأ في تسجيل دخول المدرب:', error);
                loginError.textContent = 'خطأ في الاتصال بقاعدة البيانات';
                loginError.style.display = 'block';
            }
        }
    });
    
    // إظهار التطبيق الرئيسي
    function showMainApp() {
        loginScreen.classList.remove('active');
        mainApp.classList.remove('hidden');
        document.getElementById('currentUserName').textContent = 
            currentUserType === 'public' ? 'زائر' : currentUser.name;
        buildSidebar();
        navigateTo('dashboard');
    }
    
    // تسجيل الخروج
    function logout() {
        currentUser = null;
        currentUserType = null;
        currentCoachTeam = null;
        loginScreen.classList.add('active');
        mainApp.classList.add('hidden');
        loginError.style.display = 'none';
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
    }
    
    // ==================== بناء القائمة الجانبية ====================
    function buildSidebar() {
        const sidebarMenu = document.getElementById('sidebarMenu');
        let menuItems = [];
        
        if (currentUserType === 'admin') {
            menuItems = [
                { id: 'dashboard', icon: 'fa-chart-bar', text: 'لوحة التحكم' },
                { id: 'teams', icon: 'fa-shield-halved', text: 'إدارة الفرق' },
                { id: 'matches', icon: 'fa-calendar-check', text: 'جدول المباريات' },
                { id: 'results', icon: 'fa-futbol', text: 'النتائج والإحصائيات' },
                { id: 'scorers', icon: 'fa-medal', text: 'ترتيب الهدافين' },
                { id: 'coaches', icon: 'fa-users-gear', text: 'حسابات المدربين' },
                { id: 'settings', icon: 'fa-gear', text: 'الإعدادات' }
            ];
        } else if (currentUserType === 'coach') {
            menuItems = [
                { id: 'dashboard', icon: 'fa-chart-bar', text: 'لوحة التحكم' },
                { id: 'myteam', icon: 'fa-users', text: 'فريقي' },
                { id: 'matches', icon: 'fa-calendar-check', text: 'المباريات' },
                { id: 'scorers', icon: 'fa-medal', text: 'الهدافين' }
            ];
        } else {
            menuItems = [
                { id: 'dashboard', icon: 'fa-chart-bar', text: 'الرئيسية' },
                { id: 'matches', icon: 'fa-calendar-check', text: 'المباريات' },
                { id: 'standings', icon: 'fa-table', text: 'جدول الترتيب' },
                { id: 'scorers', icon: 'fa-medal', text: 'الهدافين' }
            ];
        }
        
        sidebarMenu.innerHTML = menuItems.map(item => `
            <li class="${currentSection === item.id ? 'active' : ''}" 
                onclick="navigateTo('${item.id}')">
                <i class="fas ${item.icon}"></i>
                <span>${item.text}</span>
            </li>
        `).join('');
    }
    
    // ==================== التنقل بين الأقسام ====================
    function navigateTo(section) {
        currentSection = section;
        buildSidebar();
        
        const mainContent = document.getElementById('mainContent');
        if (!mainContent) return;
        
        mainContent.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>جاري التحميل...</p></div>';
        
        switch(section) {
            case 'dashboard':
                renderDashboard();
                break;
            case 'teams':
                if (currentUserType === 'admin') renderTeamsManagement();
                else renderDashboard();
                break;
            case 'matches':
                renderMatches();
                break;
            case 'results':
                if (currentUserType === 'admin') renderResults();
                else renderDashboard();
                break;
            case 'scorers':
                renderScorers();
                break;
            case 'standings':
                renderStandings();
                break;
            case 'coaches':
                if (currentUserType === 'admin') renderCoachesManagement();
                else renderDashboard();
                break;
            case 'myteam':
                if (currentUserType === 'coach') renderMyTeam();
                else renderDashboard();
                break;
            case 'settings':
                if (currentUserType === 'admin') renderSettings();
                else renderDashboard();
                break;
            default:
                renderDashboard();
        }
    }
    
    // ==================== دوال المودال ====================
    function openModal(content) {
        document.getElementById('modalContent').innerHTML = content;
        document.getElementById('modalOverlay').classList.add('active');
    }
    
    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
    }
    
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
        if (e.target === document.getElementById('modalOverlay')) {
            closeModal();
        }
    });
    
    // ==================== دوال مساعدة ====================
    async function loadAllData() {
        try {
            const teamsSnapshot = await db.collection('teams').get();
            allTeams = teamsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const matchesSnapshot = await db.collection('matches').get();
            allMatches = matchesSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const playersSnapshot = await db.collection('players').get();
            allPlayers = playersSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const coachesSnapshot = await db.collection('coaches').get();
            allCoaches = coachesSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            console.log('✅ تم تحميل البيانات:', {
                teams: allTeams.length,
                matches: allMatches.length,
                players: allPlayers.length,
                coaches: allCoaches.length
            });
            
        } catch (error) {
            console.error('❌ خطأ في جلب البيانات:', error);
        }
    }
    
    function getTeamName(teamCode) {
        const team = allTeams.find(t => t.code === teamCode);
        return team ? team.name : teamCode;
    }
    
    function getTeamCode(teamCode) {
        const team = allTeams.find(t => t.code === teamCode);
        return team ? team.code : teamCode;
    }
    
    function getTeamColor(teamCode) {
        const team = allTeams.find(t => t.code === teamCode);
        return team ? (team.color || '#0078d4') : '#0078d4';
    }
    
    function formatDate(dateString) {
        if (!dateString) return '';
        const parts = dateString.split('-');
        if (parts.length === 3) {
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }
        return dateString;
    }
    
    // ==================== لوحة التحكم ====================
    async function renderDashboard() {
        const mainContent = document.getElementById('mainContent');
        mainContent.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>جاري التحميل...</p></div>';
        
        await loadAllData();
        
        const today = new Date().toISOString().split('T')[0];
        const todayMatches = allMatches.filter(m => m.date === today);
        const upcomingMatches = allMatches.filter(m => m.date > today && m.status === 'upcoming');
        const finishedMatches = allMatches.filter(m => m.status === 'finished');
        const totalGoals = finishedMatches.reduce((sum, m) => sum + (m.team1Score || 0) + (m.team2Score || 0), 0);
        
        mainContent.innerHTML = `
            <h1 class="page-title">
                <i class="fas fa-tachometer-alt"></i> لوحة التحكم
            </h1>
            
            <div class="cards-grid">
                <div class="stat-card teams" onclick="navigateTo('${currentUserType === 'admin' ? 'teams' : 'standings'}')">
                    <div class="card-icon blue"><i class="fas fa-shield-halved"></i></div>
                    <div class="card-info">
                        <h3>الفرق المشاركة</h3>
                        <div class="number">${allTeams.length}</div>
                    </div>
                </div>
                <div class="stat-card matches" onclick="navigateTo('matches')">
                    <div class="card-icon green"><i class="fas fa-futbol"></i></div>
                    <div class="card-info">
                        <h3>المباريات المكتملة</h3>
                        <div class="number">${finishedMatches.length}</div>
                    </div>
                </div>
                <div class="stat-card players">
                    <div class="card-icon orange"><i class="fas fa-users"></i></div>
                    <div class="card-info">
                        <h3>إجمالي اللاعبين</h3>
                        <div class="number">${allPlayers.length}</div>
                    </div>
                </div>
                <div class="stat-card scorers" onclick="navigateTo('scorers')">
                    <div class="card-icon red"><i class="fas fa-medal"></i></div>
                    <div class="card-info">
                        <h3>إجمالي الأهداف</h3>
                        <div class="number">${totalGoals}</div>
                    </div>
                </div>
            </div>
            
            <div class="section-card">
                <div class="section-header">
                    <h2><i class="fas fa-calendar-day" style="color: var(--primary-color);"></i> مباريات اليوم</h2>
                    <span class="badge badge-info">${todayMatches.length} مباريات</span>
                </div>
                ${todayMatches.length > 0 ? `
                    <div class="today-matches">
                        ${todayMatches.map(m => renderMatchCard(m)).join('')}
                    </div>
                ` : `
                    <div style="text-align:center; padding:40px; color: var(--text-gray);">
                        <i class="fas fa-calendar-xmark" style="font-size:3rem; margin-bottom:15px;"></i>
                        <p>لا توجد مباريات اليوم</p>
                    </div>
                `}
            </div>
            
            <div class="section-card">
                <div class="section-header">
                    <h2><i class="fas fa-forward" style="color: var(--warning-color);"></i> المباريات القادمة</h2>
                </div>
                ${upcomingMatches.length > 0 ? `
                    <div class="today-matches">
                        ${upcomingMatches.slice(0, 4).map(m => renderMatchCard(m)).join('')}
                    </div>
                ` : `
                    <div style="text-align:center; padding:40px; color: var(--text-gray);">
                        <p>لا توجد مباريات قادمة</p>
                    </div>
                `}
            </div>
        `;
    }
    
    // بطاقة المباراة
    function renderMatchCard(match) {
        const statusClass = match.status === 'live' ? 'status-live' : 
                           match.status === 'finished' ? 'status-finished' : 'status-upcoming';
        const statusText = match.status === 'live' ? 'مباشر' : 
                          match.status === 'finished' ? 'انتهت' : 'قادمة';
        
        return `
            <div class="match-card">
                <span class="match-status ${statusClass}">${statusText}</span>
                <div class="match-teams">
                    <div class="match-team">
                        <div class="team-code" style="background:${getTeamColor(match.team1)};">${getTeamCode(match.team1)}</div>
                        <span>${getTeamName(match.team1)}</span>
                    </div>
                    <div class="match-vs">VS</div>
                    <div class="match-team">
                        <div class="team-code" style="background:${getTeamColor(match.team2)};">${getTeamCode(match.team2)}</div>
                        <span>${getTeamName(match.team2)}</span>
                    </div>
                </div>
                ${match.status !== 'upcoming' ? `
                    <div class="match-score">${match.team1Score || 0} - ${match.team2Score || 0}</div>
                ` : `
                    <div class="match-score" style="color:rgba(255,255,255,0.4);">- - -</div>
                `}
                <div class="match-meta">
                    <i class="far fa-calendar"></i> ${formatDate(match.date)} | 
                    <i class="far fa-clock"></i> ${match.time || '4:00 عصراً'}
                </div>
            </div>
        `;
    }
    
    console.log('⚽ نظام كأس شهداء المنصورية - جاهز');
    console.log('👤 الأدمن: admin / mansouriya2024');
    console.log('👥 الجمهور: دخول مباشر');
</script>
<script>
    // ==================== إدارة الفرق ====================
    function renderTeamsManagement() {
        const mainContent = document.getElementById('mainContent');
        
        mainContent.innerHTML = `
            <div class="section-card">
                <div class="section-header">
                    <h2><i class="fas fa-shield-halved"></i> إدارة الفرق</h2>
                    <button class="btn btn-primary" onclick="showAddTeamModal()">
                        <i class="fas fa-plus"></i> إضافة فريق جديد
                    </button>
                </div>
                <div id="teamsList">
                    <div class="loading"><i class="fas fa-spinner"></i> جاري التحميل...</div>
                </div>
            </div>
        `;
        
        loadTeamsList();
    }
    
    async function loadTeamsList() {
        await loadAllData();
        const teamsList = document.getElementById('teamsList');
        
        if (!teamsList) return;
        
        if (allTeams.length === 0) {
            teamsList.innerHTML = `
                <div style="text-align:center; padding:40px; color: var(--text-gray);">
                    <i class="fas fa-shield-halved" style="font-size:3rem; margin-bottom:15px;"></i>
                    <p>لا توجد فرق مضافة بعد</p>
                </div>
            `;
            return;
        }
        
        teamsList.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الرمز</th>
                        <th>اسم الفريق</th>
                        <th>عدد اللاعبين</th>
                        <th>المدرب</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody>
                    ${allTeams.map((team, index) => {
                        const teamPlayers = allPlayers.filter(p => p.teamCode === team.code);
                        const coach = allCoaches.find(c => c.teamCode === team.code);
                        return `
                            <tr>
                                <td>${index + 1}</td>
                                <td>
                                    <div style="background:${team.color || '#0078d4'}; color:white; width:40px; height:40px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:700;">
                                        ${team.code}
                                    </div>
                                </td>
                                <td><strong>${team.name}</strong></td>
                                <td><span class="badge badge-info">${teamPlayers.length} لاعب</span></td>
                                <td>${coach ? coach.name : '<span style="color:gray;">غير محدد</span>'}</td>
                                <td>
                                    <button class="btn btn-outline btn-sm" onclick="showEditTeamModal('${team.id}')">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn btn-danger btn-sm" onclick="deleteTeam('${team.id}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    }).join('')}
                </tbody>
            </table>
        `;
    }
    
    function showAddTeamModal() {
        openModal(`
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h3><i class="fas fa-plus-circle"></i> إضافة فريق جديد</h3>
            <form onsubmit="addTeam(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>اسم الفريق *</label>
                        <input type="text" id="teamName" required placeholder="مثال: تحدي المنصورية">
                    </div>
                    <div class="form-group">
                        <label>رمز الفريق * (3-4 أحرف)</label>
                        <input type="text" id="teamCode" required maxlength="4" placeholder="مثال: TAH" style="text-transform:uppercase;">
                    </div>
                </div>
                <div class="form-group">
                    <label>لون الفريق</label>
                    <input type="color" id="teamColor" value="#0078d4" style="height:45px;">
                </div>
                <div class="form-group">
                    <label>اسم المدرب (اختياري)</label>
                    <input type="text" id="teamCoach" placeholder="اسم المدرب">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">إلغاء</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> حفظ الفريق
                    </button>
                </div>
            </form>
        `);
    }
    
    async function addTeam(e) {
        e.preventDefault();
        const name = document.getElementById('teamName').value.trim();
        const code = document.getElementById('teamCode').value.trim().toUpperCase();
        const color = document.getElementById('teamColor').value;
        const coachName = document.getElementById('teamCoach').value.trim();
        
        if (!name || !code) {
            showAlert('الرجاء إدخال اسم ورمز الفريق', 'error');
            return;
        }
        
        // التحقق من عدم تكرار الرمز
        if (allTeams.find(t => t.code === code)) {
            showAlert('رمز الفريق موجود مسبقاً!', 'error');
            return;
        }
        
        try {
            const teamRef = await db.collection('teams').add({
                name: name,
                code: code,
                color: color,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            if (coachName) {
                const coachUsername = 'coach_' + code.toLowerCase();
                const coachPassword = code.toLowerCase() + '2024';
                await db.collection('coaches').add({
                    name: coachName,
                    username: coachUsername,
                    password: coachPassword,
                    teamCode: code,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showAlert(`تم إضافة الفريق بنجاح!\nبيانات المدرب:\nاليوزر: ${coachUsername}\nالباسورد: ${coachPassword}`, 'success');
            } else {
                showAlert('تم إضافة الفريق بنجاح!', 'success');
            }
            
            closeModal();
            await loadAllData();
            loadTeamsList();
        } catch (error) {
            console.error('خطأ في إضافة الفريق:', error);
            showAlert('خطأ في إضافة الفريق: ' + error.message, 'error');
        }
    }
    
    function showEditTeamModal(teamId) {
        const team = allTeams.find(t => t.id === teamId);
        if (!team) return;
        
        const coach = allCoaches.find(c => c.teamCode === team.code);
        
        openModal(`
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h3><i class="fas fa-edit"></i> تعديل الفريق</h3>
            <form onsubmit="updateTeam(event, '${teamId}')">
                <div class="form-row">
                    <div class="form-group">
                        <label>اسم الفريق</label>
                        <input type="text" id="editTeamName" value="${team.name}" required>
                    </div>
                    <div class="form-group">
                        <label>رمز الفريق</label>
                        <input type="text" id="editTeamCode" value="${team.code}" required maxlength="4">
                    </div>
                </div>
                <div class="form-group">
                    <label>لون الفريق</label>
                    <input type="color" id="editTeamColor" value="${team.color || '#0078d4'}" style="height:45px;">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">إلغاء</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> تحديث
                    </button>
                </div>
            </form>
        `);
    }
    
    async function updateTeam(e, teamId) {
        e.preventDefault();
        const name = document.getElementById('editTeamName').value.trim();
        const code = document.getElementById('editTeamCode').value.trim().toUpperCase();
        const color = document.getElementById('editTeamColor').value;
        
        try {
            await db.collection('teams').doc(teamId).update({ name, code, color });
            closeModal();
            await loadAllData();
            loadTeamsList();
            showAlert('تم تحديث الفريق بنجاح!', 'success');
        } catch (error) {
            console.error('خطأ في تحديث الفريق:', error);
            showAlert('خطأ في التحديث: ' + error.message, 'error');
        }
    }
    
    async function deleteTeam(teamId) {
        if (!confirm('هل أنت متأكد من حذف هذا الفريق؟ سيتم حذف جميع اللاعبين المرتبطين به.')) return;
        
        try {
            const team = allTeams.find(t => t.id === teamId);
            
            // حذف اللاعبين
            const players = allPlayers.filter(p => p.teamCode === team.code);
            for (const player of players) {
                await db.collection('players').doc(player.id).delete();
            }
            
            // حذف المدرب
            const coach = allCoaches.find(c => c.teamCode === team.code);
            if (coach) {
                await db.collection('coaches').doc(coach.id).delete();
            }
            
            await db.collection('teams').doc(teamId).delete();
            await loadAllData();
            loadTeamsList();
            showAlert('تم حذف الفريق بنجاح!', 'success');
        } catch (error) {
            console.error('خطأ في حذف الفريق:', error);
            showAlert('خطأ في الحذف: ' + error.message, 'error');
        }
    }
    
    // ==================== إدارة المباريات ====================
    function renderMatches() {
        const mainContent = document.getElementById('mainContent');
        
        mainContent.innerHTML = `
            <div class="section-card">
                <div class="section-header">
                    <h2><i class="fas fa-calendar-check"></i> جدول المباريات</h2>
                    ${currentUserType === 'admin' ? `
                        <button class="btn btn-primary" onclick="showAddMatchModal()">
                            <i class="fas fa-plus"></i> إضافة مباراة
                        </button>
                    ` : ''}
                </div>
                
                <div class="tabs">
                    <button class="tab active" onclick="filterMatches('all', this)">الكل</button>
                    <button class="tab" onclick="filterMatches('upcoming', this)">القادمة</button>
                    <button class="tab" onclick="filterMatches('live', this)">مباشر</button>
                    <button class="tab" onclick="filterMatches('finished', this)">منتهية</button>
                </div>
                
                <div id="matchesList">
                    <div class="loading"><i class="fas fa-spinner"></i> جاري التحميل...</div>
                </div>
            </div>
        `;
        
        loadMatchesList('all');
    }
    
    async function loadMatchesList(filter = 'all') {
        await loadAllData();
        const matchesList = document.getElementById('matchesList');
        if (!matchesList) return;
        
        let filteredMatches = allMatches;
        if (filter === 'upcoming') filteredMatches = allMatches.filter(m => m.status === 'upcoming');
        if (filter === 'live') filteredMatches = allMatches.filter(m => m.status === 'live');
        if (filter === 'finished') filteredMatches = allMatches.filter(m => m.status === 'finished');
        
        filteredMatches.sort((a, b) => a.date.localeCompare(b.date));
        
        if (filteredMatches.length === 0) {
            matchesList.innerHTML = `
                <div style="text-align:center; padding:40px; color: var(--text-gray);">
                    <i class="fas fa-calendar-xmark" style="font-size:3rem; margin-bottom:15px;"></i>
                    <p>لا توجد مباريات في هذا القسم</p>
                </div>
            `;
            return;
        }
        
        matchesList.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الفريق الأول</th>
                        <th>النتيجة</th>
                        <th>الفريق الثاني</th>
                        <th>التاريخ</th>
                        <th>الوقت</th>
                        <th>الملعب</th>
                        <th>الحالة</th>
                        ${currentUserType === 'admin' ? '<th>إجراءات</th>' : ''}
                    </tr>
                </thead>
                <tbody>
                    ${filteredMatches.map((m, i) => `
                        <tr>
                            <td>${i + 1}</td>
                            <td><strong>${getTeamName(m.team1)}</strong> <small>(${getTeamCode(m.team1)})</small></td>
                            <td style="font-size:1.1rem; font-weight:700;">
                                ${m.status !== 'upcoming' ? `${m.team1Score || 0} - ${m.team2Score || 0}` : '---'}
                            </td>
                            <td><strong>${getTeamName(m.team2)}</strong> <small>(${getTeamCode(m.team2)})</small></td>
                            <td>${formatDate(m.date)}</td>

    }
    
    function renderStandingsTable(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        let standingsMap = {};
        
        allTeams.forEach(team => {
            standingsMap[team.code] = {
                teamCode: team.code,
                teamName: team.name,
                teamColor: team.color,
                played: 0,
                won: 0,
                drawn: 0,
                lost: 0,
                goalsFor: 0,
                goalsAgainst: 0,
                goalDiff: 0,
                points: 0
            };
        });
        
        allMatches.filter(m => m.status === 'finished').forEach(match => {
            const team1 = standingsMap[match.team1];
            const team2 = standingsMap[match.team2];
            
            if (team1 && team2) {
                team1.played++;
                team2.played++;
                team1.goalsFor += match.team1Score || 0;
                team1.goalsAgainst += match.team2Score || 0;
                team2.goalsFor += match.team2Score || 0;
                team2.goalsAgainst += match.team1Score || 0;
                
                if (match.team1Score > match.team2Score) {
                    team1.won++;
                    team1.points += 3;
                    team2.lost++;
                } else if (match.team1Score < match.team2Score) {
                    team2.won++;
                    team2.points += 3;
                    team1.lost++;
                } else {
                    team1.drawn++;
                    team2.drawn++;
                    team1.points++;
                    team2.points++;
                }
            }
        });
        
        let standings = Object.values(standingsMap);
        standings.forEach(s => s.goalDiff = s.goalsFor - s.goalsAgainst);
        
        standings.sort((a, b) => {
            if (b.points !== a.points) return b.points - a.points;
            if (b.goalDiff !== a.goalDiff) return b.goalDiff - a.goalDiff;
            return b.goalsFor - a.goalsFor;
        });
        
        if (standings.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; padding:40px; color: var(--text-gray);">
                    <p>لا توجد بيانات كافية لعرض الترتيب</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>المركز</th>
                        <th>الفريق</th>
                        <th>لعب</th>
                        <th>فاز</th>
                        <th>تعادل</th>
                        <th>خسر</th>
                        <th>له</th>
                        <th>عليه</th>
                        <th>الفارق</th>
                        <th>النقاط</th>
                    </tr>
                </thead>
                <tbody>
                    ${standings.map((s, i) => `
                        <tr style="${i < 2 ? 'background:#f0fdf4;' : ''}">
                            <td><strong>${i + 1}</strong></td>
                            <td>
                                <div style="display:flex; align-items:center; gap:10px;">
                                    <div style="width:12px; height:12px; border-radius:50%; background:${s.teamColor || '#0078d4'};"></div>
                                    <strong>${s.teamName}</strong>
                                </div>
                            </td>
                            <td>${s.played}</td>
                            <td>${s.won}</td>
                            <td>${s.drawn}</td>
                            <td>${s.lost}</td>
                            <td>${s.goalsFor}</td>
                            <td>${s.goalsAgainst}</td>
                            <td style="${s.goalDiff > 0 ? 'color:green;' : s.goalDiff < 0 ? 'color:red;' : ''}">${s.goalDiff > 0 ? '+' : ''}${s.goalDiff}</td>
                            <td style="font-weight:700; font-size:1.1rem; color:var(--primary-color);">${s.points}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    async function loadScorersList() {
        await loadAllData();
        const scorersList = document.getElementById('scorersList');
        if (!scorersList) return;
        
        let scorersMap = {};
        
        try {
            const scorersSnapshot = await db.collection('scorers').get();
            scorersSnapshot.forEach(doc => {
                const data = doc.data();
                const key = data.playerName + '_' + data.teamCode;
                if (!scorersMap[key]) {
                    scorersMap[key] = {
                        playerName: data.playerName,
                        teamCode: data.teamCode,
                        goals: 0
                    };
                }
                scorersMap[key].goals += data.goals || 1;
            });
        } catch(e) {
            console.error('خطأ في جلب الهدافين:', e);
        }
        
        let scorers = Object.values(scorersMap);
        scorers.sort((a, b) => b.goals - a.goals);
        
        if (scorers.length === 0) {
            scorersList.innerHTML = `
                <div style="text-align:center; padding:40px; color: var(--text-gray);">
                    <i class="fas fa-futbol" style="font-size:3rem; margin-bottom:15px;"></i>
                    <p>لا يوجد هدافون بعد</p>
                </div>

            return;

                        <th>اللاعب</th>
                        <th>الفريق</th>

                        ${currentUserType === 'admin' ? '<th>إجراءات</th>' : ''}

                <tbody>
                    ${scorers.map((s, i) => `
                        <tr>

                            <td><strong>${s.playerName}</strong></td>
                            <td>${getTeamName(s.teamCode)}</td>
                            <td style="font-weight:700; font-size:1.1rem;">${s.goals}</td>
                            ${currentUserType === 'admin' ? `
                                <td>
                                    <button class="btn btn-outline btn-sm" onclick="addGoalToScorer('${s.playerName}', '${s.teamCode}')">

                                    </button>

                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;

    async function addCoach(e) {

        const name = document.getElementById('coachName').value.trim();

        const password = document.getElementById('coachPassword').value.trim();
        const teamCode = document.getElementById('coachTeam').value;
        
        const existingCoach = allCoaches.find(c => c.teamCode === teamCode);

            showAlert('يوجد مدرب مسجل مسبقاً لهذا الفريق!', 'error');

        }
        
        try {
            await db.collection('coaches').add({

                teamCode: teamCode,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

    function changeAdminPassword(e) {
        e.preventDefault();
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (currentPassword !== 'mansouriya2024') {
            showAlert('كلمة المرور الحالية غير صحيحة!', 'error');
            return;
        }
        
        if (newPassword !== confirmPassword) {
            showAlert('كلمة المرور الجديدة غير متطابقة!', 'error');
            return;
        }
        
        showAlert('تم تغيير كلمة المرور بنجاح! (ملاحظة: سيتم التطبيق في الإصدار المتصل بقاعدة البيانات)', 'success');
        document.getElementById('currentPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
    }
    
    async function testFirebaseConnection() {
        try {
            await db.collection('teams').limit(1).get();
            document.getElementById('dbStatus').textContent = 'متصل';
            document.getElementById('dbStatus').className = 'badge badge-success';
            showAlert('✅ الاتصال بقاعدة البيانات Firebase ناجح!', 'success');
        } catch (error) {
            document.getElementById('dbStatus').textContent = 'غير متصل';
            document.getElementById('dbStatus').className = 'badge badge-danger';
            showAlert('❌ فشل الاتصال: ' + error.message, 'error');
        }
    }
    
    async function resetAllData() {
        if (!confirm('⚠️ تحذير: سيتم حذف جميع البيانات (الفرق، اللاعبين، المباريات، المدربين، الهدافين). هل أنت متأكد؟')) return;
        if (!confirm('تأكيد نهائي: هذا الإجراء لا يمكن التراجع عنه!')) return;
        
        try {
            const collections = ['teams', 'players', 'matches', 'coaches', 'scorers'];
            for (const col of collections) {
                const snapshot = await db.collection(col).get();
                const batch = db.batch();
                snapshot.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
            }
            
            await loadAllData();
            showAlert('تم إعادة تعيين جميع البيانات بنجاح!', 'success');
            navigateTo('dashboard');
        } catch (error) {
            console.error('خطأ في إعادة التعيين:', error);
            showAlert('خطأ: ' + error.message, 'error');
        }
    }
