<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المدربين</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white h-screen flex flex-col items-center justify-center">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-yellow-500">بوابة المدربين</h1>
        <p class="text-gray-400">بطولة كأس شهداء المنصورية</p>
    </div>

    <div id="app" class="bg-white p-4 rounded-xl shadow-2xl">
        </div>

    <script 
        async crossorigin="anonymous" 
        data-clerk-publishable-key="pk_test_bWludC1zZWFzbXFpbC0zNS5jbGVyay5hY2NvdW50cy5kZXYk" 
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4/dist/clerk.browser.js">
    </script>
    
    <script>
        window.addEventListener('load', async function () {
            await window.Clerk.load();
            
            if (window.Clerk.user) {
                // إذا المدرب مسجل دخول
                document.getElementById('app').innerHTML = `
                    <div class="text-center text-black">
                        <h2 class="text-xl font-bold mb-4">أهلاً كابتن! تم تسجيل الدخول</h2>
                        <div id="user-button" class="flex justify-center"></div>
                    </div>
                `;
                // عرض زر حساب المستخدم
                window.Clerk.mountUserButton(document.getElementById('user-button'));
            } else {
                // إذا المدرب مممسجل دخول، نعرضله واجهة الدخول
                window.Clerk.mountSignIn(document.getElementById('app'));
            }
        });
    </script>

</body>
</html>
