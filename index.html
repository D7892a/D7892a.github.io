<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً - أحمد رعد</title>
    <style>
        body {
            font-family: 'Arial', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        
        .container {
            background-color: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 600px;
            margin: 20px;
            animation: fadeIn 1s ease-in;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 20px;
            border-bottom: 3px solid #764ba2;
            display: inline-block;
            padding-bottom: 10px;
        }
        
        .welcome-message {
            font-size: 1.3em;
            color: #333;
            line-height: 1.6;
            margin: 30px 0;
        }
        
        .name {
            color: #764ba2;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .footer {
            margin-top: 30px;
            color: #888;
            font-size: 0.9em;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px;
                margin: 15px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .welcome-message {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>مرحباً بكم</h1>
        
        <div class="welcome-message">
            <p>أهلاً وسهلاً بكم في موقع <span class="name">أحمد رعد</span></p>
            <p>يسعدنا تواجدكم معنا، ونتمنى لكم تجربة مميزة في موقعنا</p>
        </div>
        
        <div class="footer">
            <p>© 2024 جميع الحقوق محفوظة - أحمد رعد</p>
        </div>
    </div>
</body>
</html>
