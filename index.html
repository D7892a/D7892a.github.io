<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المدربين | كأس شهداء المنصورية</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div id="loading" class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-yellow-500 mx-auto mb-4"></div>
        <p>جاري الاتصال بسيرفرات الأمان...</p>
    </div>

    <div id="app" class="w-full max-w-md hidden"></div>

    <div id="dashboard" class="w-full max-w-3xl hidden bg-slate-800 p-6 rounded-2xl border border-yellow-600/30">
        <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-4">
            <div>
                <h2 class="text-2xl font-black text-yellow-500">لوحة إدارة الفريق</h2>
                <p class="text-gray-400">أهلاً بك كابتن في منصة البطولة الرسمية</p>
            </div>
            <div id="user-button"></div>
        </div>
        
        <div class="space-y-4">
            <h3 class="font-bold">➕ إضافة لاعب جديد للقائمة</h3>
            <input type="text" placeholder="اسم اللاعب الثلاثي" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600">
            <button class="bg-green-600 w-full py-3 rounded-xl font-black hover:bg-green-500 transition">حفظ اللاعب في قاعدة البيانات</button>
        </div>
    </div>

    <script 
        async crossorigin="anonymous" 
        data-clerk-publishable-key="pk_live_Y2xlcmsuYWhtZWRyYWFkLm1lJ" 
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4/dist/clerk.browser.js">
    </script>
    
    <script>
        window.addEventListener('load', async function () {
            await window.Clerk.load();
            document.getElementById('loading').classList.add('hidden');

            if (window.Clerk.user) {
                // إذا المدرب مسجل دخول، نظهر له لوحة التحكم
                document.getElementById('dashboard').classList.remove('hidden');
                window.Clerk.mountUserButton(document.getElementById('user-button'));
            } else {
                // إذا لم يسجل دخول، نظهر له واجهة Clerk الاحترافية
                document.getElementById('app').classList.remove('hidden');
                window.Clerk.mountSignIn(document.getElementById('app'));
            }
        });
    </script>
</body>
</html>
