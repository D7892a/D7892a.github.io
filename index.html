<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كأس شهداء المنصورية</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root { --primary: #0078d4; --primary-dark: #005a9e; --danger: #d13438; --success: #0b8a3e; --warning: #ffaa44; --bg: #f5f5f5; --white: #fff; --text: #1b1b1b; --gray: #605e5c; --border: #e1dfdd; --shadow: 0 2px 4px rgba(0,0,0,0.08); --shadow-md: 0 4px 8px rgba(0,0,0,0.12); --radius: 12px; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; }
        .top-nav { background: var(--primary); color: white; padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .nav-brand { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .nav-user { display: flex; align-items: center; gap: 15px; }
        .btn-logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn-logout:hover { background: rgba(255,255,255,0.35); }
        .app-container { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 260px; background: var(--white); border-left: 1px solid var(--border); padding: 20px 0; box-shadow: var(--shadow); }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { padding: 12px 20px; margin: 4px 8px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; font-size: 0.95rem; }
        .sidebar-menu li:hover { background: #f0f0f0; }
        .sidebar-menu li.active { background: #e6f2fc; color: var(--primary); font-weight: 600; }
        .sidebar-menu li i { width: 24px; text-align: center; font-size: 1.1rem; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; }
        .page-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 25px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 18px; cursor: pointer; border-right: 4px solid transparent; transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
        .stat-card.teams { border-right-color: var(--primary); } .stat-card.matches { border-right-color: var(--success); } .stat-card.scorers { border-right-color: var(--danger); }
        .card-icon { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; }
        .card-icon.blue { background: var(--primary); } .card-icon.green { background: var(--success); } .card-icon.orange { background: var(--warning); } .card-icon.red { background: var(--danger); }
        .card-info h3 { font-size: 0.85rem; color: var(--gray); margin-bottom: 4px; }
        .card-info .number { font-size: 2rem; font-weight: 700; }
        .section-card { background: var(--white); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); margin-bottom: 25px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .section-header h2 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; } .btn-primary:hover { background: var(--primary-dark); }
        .btn-success { background: var(--success); color: white; } .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); } .btn-outline:hover { background: var(--primary); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; }
        table th, table td { padding: 12px 14px; text-align: center; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        table th { background: #fafafa; font-weight: 600; color: var(--gray); font-size: 0.85rem; white-space: nowrap; }
        table tbody tr:hover { background: #f8fafd; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--white); border-radius: 16px; padding: 30px; width: 90%; max-width: 550px; position: relative; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 16px rgba(0,0,0,0.16); }
        .modal h3 { font-size: 1.3rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .modal-close { position: absolute; top: 15px; left: 15px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--gray); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .today-matches { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .match-card { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; border-radius: var(--radius); padding: 20px; text-align: center; box-shadow: var(--shadow-md); transition: transform 0.2s; }
        .match-card:hover { transform: translateY(-3px); }
        .match-teams { display: flex; align-items: center; justify-content: center; gap: 20px; font-size: 1.1rem; font-weight: 600; margin: 15px 0; }
        .match-team { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .team-code { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; color: white; }
        .match-vs { font-size: 1.5rem; font-weight: 700; color: #50b9ff; }
        .match-score { font-size: 2.5rem; font-weight: 900; margin: 10px 0; letter-spacing: 8px; }
        .match-meta { font-size: 0.85rem; color: rgba(255,255,255,0.7); }
        .match-status { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-live { background: var(--danger); animation: pulse 1.5s infinite; } .status-upcoming { background: var(--primary); } .status-finished { background: var(--success); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .tabs { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; border: none; background: transparent; font-size: 0.9rem; transition: all 0.2s; }
        .tab.active { background: var(--white); box-shadow: var(--shadow); color: var(--primary); }
        .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f0c29, #1a1a2e, #16213e); }
        .login-card { background: var(--white); border-radius: 16px; padding: 40px 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.16); }
        .login-logo { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: white; margin: 0 auto 20px; }
        .login-card h2 { margin-bottom: 8px; font-size: 1.5rem; } .login-card p { color: var(--gray); margin-bottom: 25px; }
        .login-type-selector { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: 10px; margin-bottom: 20px; }
        .login-type { flex: 1; padding: 10px; border-radius: 8px; cursor: pointer; border: none; background: transparent; font-weight: 500; }
        .login-type.active { background: white; box-shadow: var(--shadow); }
        .login-error { color: var(--danger); margin-top: 10px; font-size: 0.85rem; display: none; }
        .loading { text-align: center; padding: 40px; color: var(--gray); }
        .loading i { font-size: 2rem; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: #d4f5dd; color: var(--success); } .badge-danger { background: #fde7e7; color: var(--danger); } .badge-info { background: #d6edff; color: var(--primary); }
        .alert-box { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); padding: 15px 25px; border-radius: 10px; color: white; font-weight: 500; z-index: 3000; display: none; box-shadow: 0 8px 16px rgba(0,0,0,0.16); }
        .alert-success { background: var(--success); } .alert-error { background: var(--danger); }
        @media (max-width: 768px) { .sidebar { width: 60px; } .sidebar-menu li span { display: none; } .sidebar-menu li { justify-content: center; padding: 14px; } .form-row, .form-row.three { grid-template-columns: 1fr; } .cards-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 480px) { .cards-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="alert-box" id="alertBox"></div>

<!-- شاشة الدخول -->
<div class="login-screen active" id="loginScreen">
    <div class="login-card">
        <div class="login-logo"><i class="fas fa-futbol"></i></div>
        <h2>كأس شهداء المنصورية</h2>
        <p>نظام إدارة البطولة</p>
        <div class="login-type-selector" id="loginTypeSelector">
            <button class="login-type active" data-type="admin">أدمن</button>
            <button class="login-type" data-type="coach">مدرب</button>
            <button class="login-type" data-type="public">جمهور</button>
        </div>
        <form id="loginForm">
            <div class="form-group" id="loginUsernameGroup"><label>اسم المستخدم</label><input type="text" id="loginUsername" required></div>
            <div class="form-group" id="loginPasswordGroup"><label>كلمة المرور</label><input type="password" id="loginPassword" required></div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;"><i class="fas fa-sign-in-alt"></i> دخول</button>
        </form>
        <p class="login-error" id="loginError"></p>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div class="hidden" id="mainApp">
    <nav class="top-nav">
        <div class="nav-brand"><i class="fas fa-trophy"></i> كأس شهداء المنصورية</div>
        <div class="nav-user"><span id="currentUserName">مرحباً</span><button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button></div>
    </nav>
    <div class="app-container">
        <aside class="sidebar" id="sidebar"><ul class="sidebar-menu" id="sidebarMenu"></ul></aside>
        <main class="main-content" id="mainContent"></main>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

<script>
// ==================== FIREBASE ====================
const firebaseConfig = {
  apiKey: "AIzaSyAaE_9lHxQkqAPNESYh9quBNZCj9PKnk~j1",
  authDomain: "mansouriya2024.firebaseapp.com",
  projectId: "mansouriya2024",
  storageBucket: "mansouriya2024.firebasestorage.app",
  messagingSenderId: "456547547834",
  appId: "1:456547547834:web:b7a1e06a5e6ba058dce6083",
  measurementId: "G-WoJCJZcDF1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==================== المتغيرات ====================
let currentUser = null, currentUserType = null, currentCoachTeam = null, currentSection = 'dashboard';
let allTeams = [], allMatches = [], allPlayers = [], allCoaches = [];

// ==================== التنبيهات ====================
function showAlert(msg, type) {
    type = type || 'success';
    var box = document.getElementById('alertBox');
    box.textContent = msg;
    box.className = 'alert-box alert-' + type;
    box.style.display = 'block';
    setTimeout(function() { box.style.display = 'none'; }, 3000);
}

// ==================== تسجيل الدخول ====================
var selectedLoginType = 'admin';
document.getElementById('loginTypeSelector').addEventListener('click', function(e) {
    if (e.target.classList.contains('login-type')) {
        document.querySelectorAll('.login-type').forEach(function(b) { b.classList.remove('active'); });
        e.target.classList.add('active');
        selectedLoginType = e.target.dataset.type;
        if (selectedLoginType === 'public') {
            document.getElementById('loginUsernameGroup').classList.add('hidden');
            document.getElementById('loginPasswordGroup').classList.add('hidden');
        } else {
            document.getElementById('loginUsernameGroup').classList.remove('hidden');
            document.getElementById('loginPasswordGroup').classList.remove('hidden');
        }
    }
});

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    document.getElementById('loginError').style.display = 'none';
    if (selectedLoginType === 'public') { currentUserType = 'public'; currentUser = { name: 'زائر' }; showMainApp(); return; }
    var username = document.getElementById('loginUsername').value.trim();
    var password = document.getElementById('loginPassword').value.trim();
    if (!username || !password) { document.getElementById('loginError').textContent = 'الرجاء إدخال اسم المستخدم وكلمة المرور'; document.getElementById('loginError').style.display = 'block'; return; }
    if (selectedLoginType === 'admin') {
        if (username === 'admin' && password === 'mansouriya2024') { currentUserType = 'admin'; currentUser = { name: 'مدير البطولة' }; showMainApp(); }
        else { document.getElementById('loginError').textContent = 'بيانات الدخول غير صحيحة'; document.getElementById('loginError').style.display = 'block'; }
        return;
    }
    if (selectedLoginType === 'coach') {
        db.collection('coaches').where('username', '==', username).where('password', '==', password).get()
        .then(function(snap) {
            if (!snap.empty) { var d = snap.docs[0].data(); currentUserType = 'coach'; currentUser = { name: d.name, id: snap.docs[0].id }; currentCoachTeam = d.teamCode; showMainApp(); }
            else { document.getElementById('loginError').textContent = 'بيانات المدرب غير صحيحة'; document.getElementById('loginError').style.display = 'block'; }
        })
        .catch(function() { document.getElementById('loginError').textContent = 'خطأ في الاتصال'; document.getElementById('loginError').style.display = 'block'; });
    }
});

function showMainApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('currentUserName').textContent = currentUserType === 'public' ? 'زائر' : currentUser.name;
    buildSidebar(); navigateTo('dashboard');
}

function logout() {
    currentUser = null; currentUserType = null; currentCoachTeam = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
}

// ==================== القائمة ====================
function buildSidebar() {
    var items = [];
    if (currentUserType === 'admin') items = [
        { id: 'dashboard', icon: 'fa-chart-bar', text: 'لوحة التحكم' }, { id: 'teams', icon: 'fa-shield-halved', text: 'إدارة الفرق' },
        { id: 'matches', icon: 'fa-calendar-check', text: 'جدول المباريات' }, { id: 'results', icon: 'fa-futbol', text: 'النتائج والإحصائيات' },
        { id: 'scorers', icon: 'fa-medal', text: 'ترتيب الهدافين' }, { id: 'coaches', icon: 'fa-users-gear', text: 'حسابات المدربين' }, { id: 'settings', icon: 'fa-gear', text: 'الإعدادات' }
    ];
    else if (currentUserType === 'coach') items = [
        { id: 'dashboard', icon: 'fa-chart-bar', text: 'لوحة التحكم' }, { id: 'myteam', icon: 'fa-users', text: 'فريقي' },
        { id: 'matches', icon: 'fa-calendar-check', text: 'المباريات' }, { id: 'scorers', icon: 'fa-medal', text: 'الهدافين' }
    ];
    else items = [
        { id: 'dashboard', icon: 'fa-chart-bar', text: 'الرئيسية' }, { id: 'matches', icon: 'fa-calendar-check', text: 'المباريات' },
        { id: 'standings', icon: 'fa-table', text: 'جدول الترتيب' }, { id: 'scorers', icon: 'fa-medal', text: 'الهدافين' }
    ];
    var html = '';
    items.forEach(function(item) { html += '<li class="' + (currentSection === item.id ? 'active' : '') + '" onclick="navigateTo(\'' + item.id + '\')"><i class="fas ' + item.icon + '"></i><span>' + item.text + '</span></li>'; });
    document.getElementById('sidebarMenu').innerHTML = html;
}

// ==================== التنقل ====================
function navigateTo(section) {
    currentSection = section; buildSidebar();
    var main = document.getElementById('mainContent'); if (!main) return;
    main.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>جاري التحميل...</p></div>';
    loadAllData().then(function() {
        if (section === 'dashboard') renderDashboard();
        else if (section === 'teams' && currentUserType === 'admin') renderTeamsManagement();
        else if (section === 'matches') renderMatches();
        else if (section === 'results' && currentUserType === 'admin') renderResults();
        else if (section === 'scorers') renderScorers();
        else if (section === 'standings') renderStandings();
        else if (section === 'coaches' && currentUserType === 'admin') renderCoachesManagement();
        else if (section === 'myteam' && currentUserType === 'coach') renderMyTeam();
        else if (section === 'settings' && currentUserType === 'admin') renderSettings();
        else renderDashboard();
    });
}

// ==================== المودال ====================
function openModal(c) { document.getElementById('modalContent').innerHTML = c; document.getElementById('modalOverlay').classList.add('active'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); });

// ==================== تحميل البيانات ====================
function loadAllData() {
    return Promise.all([
        db.collection('teams').get().then(function(s) { allTeams = []; s.forEach(function(d) { allTeams.push({ id: d.id, ...d.data() }); }); }),
        db.collection('matches').get().then(function(s) { allMatches = []; s.forEach(function(d) { allMatches.push({ id: d.id, ...d.data() }); }); }),
        db.collection('players').get().then(function(s) { allPlayers = []; s.forEach(function(d) { allPlayers.push({ id: d.id, ...d.data() }); }); }),
        db.collection('coaches').get().then(function(s) { allCoaches = []; s.forEach(function(d) { allCoaches.push({ id: d.id, ...d.data() }); }); })
    ]);
}

function getTeamName(code) { var t = allTeams.find(function(x) { return x.code === code; }); return t ? t.name : code; }
function getTeamCode(code) { var t = allTeams.find(function(x) { return x.code === code; }); return t ? t.code : code; }
function getTeamColor(code) { var t = allTeams.find(function(x) { return x.code === code; }); return t ? (t.color || '#0078d4') : '#0078d4'; }
function formatDate(d) { if (!d) return ''; var p = d.split('-'); return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : d; }

// ==================== لوحة التحكم ====================
function renderDashboard() {
    var main = document.getElementById('mainContent');
    var today = new Date().toISOString().split('T')[0];
    var todayM = allMatches.filter(function(m) { return m.date === today; });
    var upcM = allMatches.filter(function(m) { return m.date > today && m.status === 'upcoming'; });
    var finM = allMatches.filter(function(m) { return m.status === 'finished'; });
    var tG = finM.reduce(function(s, m) { return s + (m.team1Score || 0) + (m.team2Score || 0); }, 0);
    var html = '<h1 class="page-title"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</h1><div class="cards-grid">';
    html += '<div class="stat-card teams" onclick="navigateTo(\'' + (currentUserType === 'admin' ? 'teams' : 'standings') + '\')"><div class="card-icon blue"><i class="fas fa-shield-halved"></i></div><div class="card-info"><h3>الفرق المشاركة</h3><div class="number">' + allTeams.length + '</div></div></div>';
    html += '<div class="stat-card matches" onclick="navigateTo(\'matches\')"><div class="card-icon green"><i class="fas fa-futbol"></i></div><div class="card-info"><h3>المباريات المكتملة</h3><div class="number">' + finM.length + '</div></div></div>';
    html += '<div class="stat-card"><div class="card-icon orange"><i class="fas fa-users"></i></div><div class="card-info"><h3>إجمالي اللاعبين</h3><div class="number">' + allPlayers.length + '</div></div></div>';
    html += '<div class="stat-card scorers" onclick="navigateTo(\'scorers\')"><div class="card-icon red"><i class="fas fa-medal"></i></div><div class="card-info"><h3>إجمالي الأهداف</h3><div class="number">' + tG + '</div></div></div></div>';

    html += '<div class="section-card"><div class="section-header"><h2><i class="fas fa-calendar-day" style="color:var(--primary);"></i> مباريات اليوم</h2><span class="badge badge-info">' + todayM.length + ' مباريات</span></div>';
    html += todayM.length > 0 ? '<div class="today-matches">' + todayM.map(renderMatchCard).join('') + '</div>' : '<div style="text-align:center;padding:40px;color:var(--gray);"><i class="fas fa-calendar-xmark" style="font-size:3rem;margin-bottom:15px;"></i><p>لا توجد مباريات اليوم</p></div>';
    html += '</div><div class="section-card"><div class="section-header"><h2><i class="fas fa-forward" style="color:var(--warning);"></i> المباريات القادمة</h2></div>';

function renderResults() {
    var fin = allMatches.filter(function(m) { return m.status === 'finished'; });
    var tg = fin.reduce(function(s, m) { return s + (m.team1Score||0) + (m.team2Score||0); }, 0);
    var avg = fin.length ? (tg / fin.length).toFixed(1) : 0;
    document.getElementById('mainContent').innerHTML = '<h1 class="page-title"><i class="fas fa-chart-pie"></i> الإحصائيات</h1><div class="cards-grid"><div class="stat-card"><div class="card-icon green"><i class="fas fa-check-circle"></i></div><div class="card-info"><h3>مكتملة</h3><div class="number">' + fin.length + '</div></div></div><div class="stat-card"><div class="card-icon red"><i class="fas fa-futbol"></i></div><div class="card-info"><h3>الأهداف</h3><div class="number">' + tg + '</div></div></div><div class="stat-card"><div class="card-icon orange"><i class="fas fa-chart-line"></i></div><div class="card-info"><h3>المعدل</h3><div class="number">' + avg + '</div></div></div></div><div class="section-card"><h2>جدول الترتيب</h2><div id="standingsTable"></div></div>';
    renderStandingsTable('standingsTable');
}
function renderStandings() { document.getElementById('mainContent').innerHTML = '<div class="section-card"><h2>جدول الترتيب</h2><div id="pubStandings"></div></div>'; renderStandingsTable('pubStandings'); }
function renderStandingsTable(cid) {
    var c = document.getElementById(cid); if (!c) return;
    var map = {};
    allTeams.forEach(function(t) { map[t.code] = { name: t.name, color: t.color, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 }; });
    allMatches.filter(function(m) { return m.status === 'finished'; }).forEach(function(m) {
        var a = map[m.team1], b = map[m.team2]; if (!a || !b) return;
        a.p++; b.p++; a.gf += m.team1Score||0; a.ga += m.team2Score||0; b.gf += m.team2Score||0; b.ga += m.team1Score||0;
        if (m.team1Score > m.team2Score) { a.w++; a.pts += 3; b.l++; } else if (m.team1Score < m.team2Score) { b.w++; b.pts += 3; a.l++; } else { a.d++; b.d++; a.pts++; b.pts++; }
    });
    var arr = Object.entries(map).map(function(e) { e[1].code = e[0]; e[1].gd = e[1].gf - e[1].ga; return e[1]; });
    arr.sort(function(a, b) { return b.pts - a.pts || b.gd - a.gd || b.gf - a.gf; });
    var h = '<table><thead><tr><th>#</th><th>الفريق</th><th>لعب</th><th>فاز</th><th>تعادل</th><th>خسر</th><th>له</th><th>عليه</th><th>فارق</th><th>نقاط</th></tr></thead><tbody>';
    arr.forEach(function(t, i) { h += '<tr style="' + (i<2?'background:#f0fdf4;':'') + '"><td>' + (i+1) + '</td><td><div style="display:flex;align-items:center;gap:8px;"><div style="width:10px;height:10px;border-radius:50%;background:' + (t.color||'#0078d4') + ';"></div>' + t.name + '</div></td><td>' + t.p + '</td><td>' + t.w + '</td><td>' + t.d + '</td><td>' + t.l + '</td><td>' + t.gf + '</td><td>' + t.ga + '</td><td>' + (t.gd>0?'+':'') + t.gd + '</td><td style="font-weight:700;color:var(--primary);">' + t.pts + '</td></tr>'; });
    h += '</tbody></table>'; c.innerHTML = h;
}

function loadCoachesList() {
    var c = document.getElementById('coachesList'); if (!c) return;
    if (!allCoaches.length) { c.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-user-plus" style="font-size:3rem;"></i><p>لا يوجد مدربون</p></div>'; return; }
    var h = '<table><thead><tr><th>#</th><th>الاسم</th><th>المستخدم</th><th>كلمة المرور</th><th>الفريق</th><th>لاعبين</th><th>إجراءات</th></tr></thead><tbody>';
    allCoaches.forEach(function(co, i) { var cnt = allPlayers.filter(function(p) { return p.teamCode === co.teamCode; }).length; h += '<tr><td>' + (i+1) + '</td><td>' + co.name + '</td><td><code>' + co.username + '</code></td><td><code>' + co.password + '</code></td><td>' + getTeamName(co.teamCode) + '</td><td>' + cnt + '</td><td><button class="btn btn-outline btn-sm" onclick="showEditCoachModal(\'' + co.id + '\')"><i class="fas fa-edit"></i></button> <button class="btn btn-danger btn-sm" onclick="deleteCoach(\'' + co.id + '\')"><i class="fas fa-trash"></i></button></td></tr>'; });
    h += '</tbody></table>'; c.innerHTML = h;
}
function showAddCoachModal() {
    var opts = allTeams.map(function(t) { return '<option value="' + t.code + '">' + t.name + '</option>'; }).join('');
    openModal('<button class="modal-close" onclick="closeModal()">✕</button><h3>إضافة مدرب</h3><form onsubmit="addCoach(event)"><div class="form-group"><label>الاسم</label><input type="text" id="coachName" required></div><div class="form-row"><div class="form-group"><label>المستخدم</label><input type="text" id="coachUser" required></div><div class="form-group"><label>كلمة المرور</label><input type="text" id="coachPass" required></div></div><div class="form-group"><label>الفريق</label><select id="coachTeam" required><option value="">اختر</option>' + opts + '</select></div><div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">إلغاء</button><button type="submit" class="btn btn-primary">حفظ</button></div></form>');
}
function addCoach(e) { e.preventDefault(); var tc = document.getElementById('coachTeam').value; if (allCoaches.find(function(x) { return x.teamCode === tc; })) { showAlert('يوجد مدرب للفريق!', 'error'); return; } db.collection('coaches').add({ name: document.getElementById('coachName').value.trim(), username: document.getElementById('coachUser').value.trim(), password: document.getElementById('coachPass').value.trim(), teamCode: tc, createdAt: firebase.firestore.FieldValue.serverTimestamp() }).then(function() { closeModal(); loadAllData().then(loadCoachesList); showAlert('تم!', 'success'); }); }
function showEditCoachModal(id) { var x = allCoaches.find(function(c) { return c.id === id; }); if (!x) return; var opts = allTeams.map(function(t) { return '<option value="' + t.code + '" ' + (t.code === x.teamCode ? 'selected' : '') + '>' + t.name + '</option>'; }).join(''); openModal('<button class="modal-close" onclick="closeModal()">✕</button><h3>تعديل</h3><form onsubmit="updateCoach(event, \'' + id + '\')"><div class="form-group"><label>الاسم</label><input type="text" id="editCoachName" value="' + x.name + '"></div><div class="form-row"><div class="form-group"><label>المستخدم</label><input type="text" id="editCoachUser" value="' + x.username + '"></div><div class="form-group"><label>كلمة المرور</label><input type="text" id="editCoachPass" value="' + x.password + '"></div></div><div class="form-group"><label>الفريق</label><select id="editCoachTeam">' + opts + '</select></div><div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">إلغاء</button><button type="submit" class="btn btn-primary">تحديث</button></div></form>'); }
function updateCoach(e, id) { e.preventDefault(); db.collection('coaches').doc(id).update({ name: document.getElementById('editCoachName').value, username: document.getElementById('editCoachUser').value, password: document.getElementById('editCoachPass').value, teamCode: document.getElementById('editCoachTeam').value }).then(function() { closeModal(); loadAllData().then(loadCoachesList); showAlert('تم!', 'success'); }); }
function deleteCoach(id) { if (!confirm('حذف؟')) return; db.collection('coaches').doc(id).delete().then(function() { loadAllData().then(loadCoachesList); showAlert('تم!', 'success'); }); }

// ==================== فريق المدرب ====================
function renderMyTeam() {
    var t = allTeams.find(function(x) { return x.code === currentCoachTeam; });
    var pl = allPlayers.filter(function(p) { return p.teamCode === currentCoachTeam; });
    var h = '<h1 class="page-title"><i class="fas fa-users"></i> فريقي - ' + (t?t.name:'') + '</h1><div class="section-card"><div class="section-header"><h2>اللاعبين (' + pl.length + ')</h2><button class="btn btn-primary" onclick="showAddPlayerModal()"><i class="fas fa-plus"></i> إضافة</button></div>';
    if (!pl.length) h += '<div style="text-align:center;padding:40px;"><p>لا يوجد لاعبين</p></div>';
    else { h += '<table><thead><tr><th>#</th><th>الرقم</th><th>الاسم</th><th>المركز</th><th>إجراءات</th></tr></thead><tbody>'; pl.forEach(function(p, i) { h += '<tr><td>' + (i+1) + '</td><td>' + (p.number||'-') + '</td><td><strong>' + p.name + '</strong></td><td>' + (p.position||'-') + '</td><td><button class="btn btn-outline btn-sm" onclick="showEditPlayerModal(\'' + p.id + '\')"><i class="fas fa-edit"></i></button> <button class="btn btn-danger btn-sm" onclick="deletePlayer(\'' + p.id + '\')"><i class="fas fa-trash"></i></button></td></tr>'; }); h += '</tbody></table>'; }
    h += '</div>'; document.getElementById('mainContent').innerHTML = h;
}
function showAddPlayerModal() { openModal('<button class="modal-close" onclick="closeModal()">✕</button><h3>إضافة لاعب</h3><form onsubmit="addPlayer(event)"><div class="form-group"><label>الاسم</label><input type="text" id="plName" required></div><div class="form-row"><div class="form-group"><label>الرقم</label><input type="number" id="plNum" min="1"></div><div class="form-group"><label>المركز</label><select id="plPos"><option value="">اختر</option><option>حارس مرمى</option><option>مدافع</option><option>وسط</option><option>مهاجم</option></select></div></div><div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">إلغاء</button><button type="submit" class="btn btn-primary">حفظ</button></div></form>'); }
function addPlayer(e) { e.preventDefault(); db.collection('players').add({ name: document.getElementById('plName').value.trim(), number: document.getElementById('plNum').value || null, position: document.getElementById('plPos').value, teamCode: currentCoachTeam, createdAt: firebase.firestore.FieldValue.serverTimestamp() }).then(function() { closeModal(); loadAllData().then(renderMyTeam); showAlert('تم!', 'success'); }); }
function showEditPlayerModal(id) { var p = allPlayers.find(function(x) { return x.id === id; }); if (!p) return; openModal('<button class="modal-close" onclick="closeModal()">✕</button><h3>تعديل</h3><form onsubmit="updatePlayer(event, \'' + id + '\')"><div class="form-group"><label>الاسم</label><input type="text" id="editPlName" value="' + p.name + '"></div><div class="form-row"><div class="form-group"><label>الرقم</label><input type="number" id="editPlNum" value="' + (p.number||'') + '"></div><div class="form-group"><label>المركز</label><select id="editPlPos"><option value="">اختر</option><option ' + (p.position==='حارس مرمى'?'selected':'') + '>حارس مرمى</option><option ' + (p.position==='مدافع'?'selected':'') + '>مدافع</option><option ' + (p.position==='وسط'?'selected':'') + '>وسط</option><option ' + (p.position==='مهاجم'?'selected':'') + '>مهاجم</option></select></div></div><div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">إلغاء</button><button type="submit" class="btn btn-primary">تحديث</button></div></form>'); }
function updatePlayer(e, id) { e.preventDefault(); db.collection('players').doc(id).update({ name: document.getElementById('editPlName').value.trim(), number: document.getElementById('editPlNum').value || null, position: document.getElementById('editPlPos').value }).then(function() { closeModal(); loadAllData().then(renderMyTeam); showAlert('تم!', 'success'); }); }
function deletePlayer(id) { if (!confirm('حذف؟')) return; db.collection('players').doc(id).delete().then(function() { loadAllData().then(renderMyTeam); showAlert('تم!', 'success'); }); }

// ==================== الإعدادات ====================
function renderSettings() { document.getElementById('mainContent').innerHTML = '<h1 class="page-title"><i class="fas fa-gear"></i> الإعدادات</h1><div class="section-card"><h2>تغيير كلمة المرور</h2><form onsubmit="changePass(event)"><div class="form-group"><label>الحالية</label><input type="password" id="curPass" required></div><div class="form-group"><label>الجديدة</label><input type="password" id="newPass" required></div><div class="form-group"><label>تأكيد</label><input type="password" id="confPass" required></div><button type="submit" class="btn btn-primary">تحديث</button></form></div><div class="section-card"><h2>قاعدة البيانات</h2><p>الحالة: <span class="badge badge-success" id="dbStatus">متصل</span></p><button class="btn btn-outline" onclick="testDB()">اختبار</button> <button class="btn btn-danger" onclick="resetDB()">إعادة تعيين</button></div>'; }
function changePass(e) { e.preventDefault(); var c = document.getElementById('curPass').value, n = document.getElementById('newPass').value, f = document.getElementById('confPass').value; if (c !== 'mansouriya2024') { showAlert('كلمة المرور الحالية خطأ!', 'error'); return; } if (n !== f) { showAlert('غير متطابقة!', 'error'); return; } showAlert('تم التغيير!', 'success'); }
function testDB() { db.collection('teams').limit(1).get().then(function() { document.getElementById('dbStatus').textContent = 'متصل'; document.getElementById('dbStatus').className = 'badge badge-success'; showAlert('✅ متصل', 'success'); }).catch(function(e) { document.getElementById('dbStatus').textContent = 'غير متصل'; document.getElementById('dbStatus').className = 'badge badge-danger'; showAlert('❌ ' + e.message, 'error'); }); }
function resetDB() { if (!confirm('⚠️ حذف كل البيانات؟')) return; if (!confirm('تأكيد نهائي!')) return; var cols = ['teams','players','matches','coaches','scorers']; var ps = []; cols.forEach(function(c) { ps.push(db.collection(c).get().then(function(s) { var b = db.batch(); s.forEach(function(d) { b.delete(d.ref); }); return b.commit(); })); }); Promise.all(ps).then(function() { loadAllData().then(function() { navigateTo('dashboard'); }); showAlert('تم إعادة التعيين!', 'success'); }); }

console.log('⚽ كأس شهداء المنصورية - جاهز 100%');

</script>
