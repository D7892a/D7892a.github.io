<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كأس شهداء المنصورية</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
        :root{--primary:#0078d4;--primary-dark:#005a9e;--danger:#d13438;--success:#0b8a3e;--warning:#ffaa44;--bg:#f5f5f5;--white:#fff;--text:#1b1b1b;--gray:#605e5c;--border:#e1dfdd;--shadow:0 2px 4px rgba(0,0,0,0.08);--shadow-md:0 4px 8px rgba(0,0,0,0.12);--radius:12px}
        body{background:var(--bg);color:var(--text);min-height:100vh}
        .top-nav{background:var(--primary);color:white;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000}
        .nav-brand{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:10px}
        .nav-user{display:flex;align-items:center;gap:15px}
        .btn-logout{background:rgba(255,255,255,0.2);border:none;color:white;padding:8px 16px;border-radius:6px;cursor:pointer}
        .app-container{display:flex;min-height:calc(100vh - 56px)}
        .sidebar{width:260px;background:var(--white);border-left:1px solid var(--border);padding:20px 0}
        .sidebar-menu{list-style:none}
        .sidebar-menu li{padding:12px 20px;margin:4px 8px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.2s}
        .sidebar-menu li:hover{background:#f0f0f0}
        .sidebar-menu li.active{background:#e6f2fc;color:var(--primary);font-weight:600}
        .main-content{flex:1;padding:25px;overflow-y:auto}
        .page-title{font-size:1.8rem;font-weight:700;margin-bottom:25px}
        .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-bottom:30px}
        .stat-card{background:var(--white);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);display:flex;align-items:center;gap:18px;cursor:pointer;border-right:4px solid transparent;transition:transform 0.2s}
        .stat-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
        .stat-card.teams{border-right-color:var(--primary)}
        .stat-card.matches{border-right-color:var(--success)}
        .stat-card.scorers{border-right-color:var(--danger)}
        .card-icon{width:55px;height:55px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:white}
        .card-icon.blue{background:var(--primary)}
        .card-icon.green{background:var(--success)}
        .card-icon.orange{background:var(--warning)}
        .card-icon.red{background:var(--danger)}
        .card-info h3{font-size:0.85rem;color:var(--gray);margin-bottom:4px}
        .card-info .number{font-size:2rem;font-weight:700}
        .section-card{background:var(--white);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:25px}
        .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
        .section-header h2{font-size:1.2rem;font-weight:600}
        .btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:0.9rem;font-weight:500;display:flex;align-items:center;gap:8px;transition:all 0.2s}
        .btn-primary{background:var(--primary);color:white}
        .btn-primary:hover{background:var(--primary-dark)}
        .btn-success{background:var(--success);color:white}
        .btn-danger{background:var(--danger);color:white}
        .btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
        .btn-sm{padding:6px 12px;font-size:0.8rem}
        table{width:100%;border-collapse:collapse}
        table th,table td{padding:12px 14px;text-align:center;border-bottom:1px solid var(--border);font-size:0.9rem}
        table th{background:#fafafa;font-weight:600;color:var(--gray)}
        table tbody tr:hover{background:#f8fafd}
        .form-group{margin-bottom:14px}
        .form-group label{display:block;margin-bottom:6px;font-weight:500}
        .form-group input,.form-group select{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:0.95rem}
        .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .form-row.three{grid-template-columns:1fr 1fr 1fr}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;display:none;align-items:center;justify-content:center}
        .modal-overlay.active{display:flex}
        .modal{background:var(--white);border-radius:16px;padding:30px;width:90%;max-width:550px;position:relative;max-height:85vh;overflow-y:auto}
        .modal h3{font-size:1.3rem;margin-bottom:20px}
        .modal-close{position:absolute;top:15px;left:15px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--gray)}
        .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
        .today-matches{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
        .match-card{background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;border-radius:var(--radius);padding:20px;text-align:center;box-shadow:var(--shadow-md)}
        .match-teams{display:flex;align-items:center;justify-content:center;gap:20px;font-size:1.1rem;font-weight:600;margin:15px 0}
        .team-code{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;color:white}
        .match-vs{font-size:1.5rem;font-weight:700;color:#50b9ff}
        .match-score{font-size:2.5rem;font-weight:900;margin:10px 0;letter-spacing:8px}
        .match-meta{font-size:0.85rem;color:rgba(255,255,255,0.7)}
        .match-status{display:inline-block;padding:4px 14px;border-radius:20px;font-size:0.8rem;font-weight:600}
        .status-live{background:var(--danger);animation:pulse 1.5s infinite}
        .status-upcoming{background:var(--primary)}
        .status-finished{background:var(--success)}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
        .tabs{display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:10px;margin-bottom:20px}
        .tab{padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:500;border:none;background:transparent}
        .tab.active{background:var(--white);box-shadow:var(--shadow);color:var(--primary)}
        .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0c29,#1a1a2e,#16213e)}
        .login-card{background:var(--white);border-radius:16px;padding:40px 30px;width:90%;max-width:400px;text-align:center}
        .login-logo{width:80px;height:80px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:white;margin:0 auto 20px}
        .login-card h2{margin-bottom:8px}
        .login-card p{color:var(--gray);margin-bottom:25px}
        .login-type-selector{display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:10px;margin-bottom:20px}
        .login-type{flex:1;padding:10px;border-radius:8px;cursor:pointer;border:none;background:transparent;font-weight:500}
        .login-type.active{background:white;box-shadow:var(--shadow)}
        .login-error{color:var(--danger);margin-top:10px;font-size:0.85rem;display:none}
        .loading{text-align:center;padding:40px;color:var(--gray)}
        .loading i{font-size:2rem;animation:spin 1s linear infinite}
        @keyframes spin{100%{transform:rotate(360deg)}}
        .hidden{display:none!important}
        .badge{display:inline-block;padding:4px 10px;border-radius:12px;font-size:0.75rem;font-weight:600}
        .badge-success{background:#d4f5dd;color:var(--success)}
        .badge-danger{background:#fde7e7;color:var(--danger)}
        .badge-info{background:#d6edff;color:var(--primary)}
        .alert-box{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:15px 25px;border-radius:10px;color:white;font-weight:500;z-index:3000;display:none;box-shadow:0 8px 16px rgba(0,0,0,0.16)}
        .alert-success{background:var(--success)}
        .alert-error{background:var(--danger)}
        @media(max-width:768px){.sidebar{width:60px}.sidebar-menu li span{display:none}.sidebar-menu li{justify-content:center;padding:14px}.form-row,.form-row.three{grid-template-columns:1fr}.cards-grid{grid-template-columns:1fr 1fr}}
        @media(max-width:480px){.cards-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>

<div class="alert-box" id="alertBox"></div>

<!-- شاشة الدخول -->
<div class="login-screen active" id="loginScreen">
    <div class="login-card">
        <div class="login-logo"><i class="fas fa-futbol"></i></div>
        <h2>كأس شهداء المنصورية</h2>
        <p>نظام إدارة البطولة</p>
        <div class="login-type-selector" id="loginTypeSelector">
            <button class="login-type active" data-type="admin">أدمن</button>
            <button class="login-type" data-type="coach">مدرب</button>
            <button class="login-type" data-type="public">جمهور</button>
        </div>
        <form id="loginForm">
            <div class="form-group" id="loginUsernameGroup">
                <label>اسم المستخدم</label>
                <input type="text" id="loginUsername" required>
            </div>
            <div class="form-group" id="loginPasswordGroup">
                <label>كلمة المرور</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                <i class="fas fa-sign-in-alt"></i> دخول
            </button>
        </form>
        <p class="login-error" id="loginError"></p>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div class="hidden" id="mainApp">
    <nav class="top-nav">
        <div class="nav-brand"><i class="fas fa-trophy"></i> كأس شهداء المنصورية</div>
        <div class="nav-user">
            <span id="currentUserName">مرحباً</span>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </nav>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <ul class="sidebar-menu" id="sidebarMenu"></ul>
        </aside>
        <main class="main-content" id="mainContent"></main>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
</div>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
    apiKey: "AIzaSyQ0bwvHx1gofhUoB3XGdkuhcBe---GnG98",
    authDomain: "smartteacherhub.firebaseapp.com",
    databaseURL: "https://smartteacherhub-default-rtdb.firebaseio.com",
    projectId: "smartteacherhub",
    storageBucket: "smartteacherhub.firebasestorage.app",
    messagingSenderId: "151352147937",
    appId: "1:151352147937:web:325d72abc475b592cc69caa"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==================== متغيرات عامة ====================
let currentUser = null;
let currentUserType = null;
let currentCoachTeam = null;
let currentSection = 'dashboard';
let allTeams = [];
let allMatches = [];
let allPlayers = [];
let allCoaches = [];

// ==================== دوال التنبيه ====================
function showAlert(msg, type) {
    type = type || 'success';
    var box = document.getElementById('alertBox');
    box.textContent = msg;
    box.className = 'alert-box alert-' + type;
    box.style.display = 'block';
    setTimeout(function() { box.style.display = 'none'; }, 3000);
}

// ==================== تسجيل الدخول ====================
var selectedLoginType = 'admin';

document.getElementById('loginTypeSelector').addEventListener('click', function(e) {
    if (e.target.classList.contains('login-type')) {
        document.querySelectorAll('.login-type').forEach(function(b) { b.classList.remove('active'); });
        e.target.classList.add('active');
        selectedLoginType = e.target.dataset.type;
        if (selectedLoginType === 'public') {
            document.getElementById('loginUsernameGroup').classList.add('hidden');
            document.getElementById('loginPasswordGroup').classList.add('hidden');
        } else {
            document.getElementById('loginUsernameGroup').classList.remove('hidden');
            document.getElementById('loginPasswordGroup').classList.remove('hidden');
        }
    }
});

document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    document.getElementById('loginError').style.display = 'none';
    
    if (selectedLoginType === 'public') {
        currentUserType = 'public';
        currentUser = { name: 'زائر' };
        showMainApp();
        return;
    }
    
    var username = document.getElementById('loginUsername').value.trim();
    var password = document.getElementById('loginPassword').value.trim();
    
    if (!username || !password) {
        document.getElementById('loginError').textContent = 'الرجاء إدخال اسم المستخدم وكلمة المرور';
        document.getElementById('loginError').style.display = 'block';
        return;
    }
    
    if (selectedLoginType === 'admin') {
        if (username === 'admin' && password === 'mansouriya2024') {
            currentUserType = 'admin';
            currentUser = { name: 'مدير البطولة' };
            showMainApp();
        } else {
            document.getElementById('loginError').textContent = 'بيانات الدخول غير صحيحة';
            document.getElementById('loginError').style.display = 'block';
        }
        return;
    }
    
    if (selectedLoginType === 'coach') {
        db.collection('coaches').where('username', '==', username).where('password', '==', password).get()
        .then(function(querySnapshot) {
            if (!querySnapshot.empty) {
                var coachData = querySnapshot.docs[0].data();
                currentUserType = 'coach';
                currentUser = { name: coachData.name, id: querySnapshot.docs[0].id };
                currentCoachTeam = coachData.teamCode;
                showMainApp();
            } else {
                document.getElementById('loginError').textContent = 'بيانات المدرب غير صحيحة';
                document.getElementById('loginError').style.display = 'block';
            }
        })
        .catch(function(error) {
            document.getElementById('loginError').textContent = 'خطأ في الاتصال بقاعدة البيانات';
            document.getElementById('loginError').style.display = 'block';
        });
    }
});

function showMainApp() {
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('currentUserName').textContent = currentUserType === 'public' ? 'زائر' : currentUser.name;
    buildSidebar();
    navigateTo('dashboard');
}

function logout() {
    currentUser = null;
    currentUserType = null;
    currentCoachTeam = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginScreen').classList.add('active');
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('loginError').style.display = 'none';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
}

// ==================== القائمة الجانبية ====================
function buildSidebar() {
    var menuItems = [];
    if (currentUserType === 'admin') {
        menuItems = [
            { id: 'dashboard', icon: 'fa-chart-bar', text: 'لوحة التحكم' },
            { id: 'teams', icon: 'fa-shield-halved', text: 'إدارة الفرق' },
            { id: 'matches', icon: 'fa-calendar-check', text: 'جدول المباريات' },
            { id: 'results', icon: 'fa-futbol', text: 'النتائج والإحصائيات' },
            { id: 'scorers', icon: 'fa-medal', text: 'ترتيب الهدافين' },
            { id: 'coaches', icon: 'fa-users-gear', text: 'حسابات المدربين' },
            { id: 'settings', icon: 'fa-gear', text: 'الإعدادات' }
        ];
    } else if (currentUserType === 'coach') {
        menuItems = [
            { id: 'dashboard', icon: 'fa-chart-bar', text: 'لوحة التحكم' },
            { id: 'myteam', icon: 'fa-users', text: 'فريقي' },
            { id: 'matches', icon: 'fa-calendar-check', text: 'المباريات' },
            { id: 'scorers', icon: 'fa-medal', text: 'الهدافين' }
        ];
    } else {
        menuItems = [
            { id: 'dashboard', icon: 'fa-chart-bar', text: 'الرئيسية' },
            { id: 'matches', icon: 'fa-calendar-check', text: 'المباريات' },
            { id: 'standings', icon: 'fa-table', text: 'جدول الترتيب' },
            { id: 'scorers', icon: 'fa-medal', text: 'الهدافين' }
        ];
    }
    
    var sidebarMenu = document.getElementById('sidebarMenu');
    var html = '';
    for (var i = 0; i < menuItems.length; i++) {
        var item = menuItems[i];
        var activeClass = (currentSection === item.id) ? ' active' : '';
        html += '<li class="' + activeClass + '" onclick="navigateTo(\'' + item.id + '\')">';
        html += '<i class="fas ' + item.icon + '"></i>';
        html += '<span>' + item.text + '</span>';
        html += '</li>';
    }
    sidebarMenu.innerHTML = html;
}

// ==================== التنقل ====================
function navigateTo(section) {
    currentSection = section;
    buildSidebar();
    
    var mainContent = document.getElementById('mainContent');
    if (!mainContent) return;
    
    mainContent.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>جاري التحميل...</p></div>';
    
    loadAllData().then(function() {
        if (section === 'dashboard') renderDashboard();
        else if (section === 'teams' && currentUserType === 'admin') renderTeamsManagement();
        else if (section === 'matches') renderMatches();
        else if (section === 'results' && currentUserType === 'admin') renderResults();
        else if (section === 'scorers') renderScorers();
        else if (section === 'standings') renderStandings();
        else if (section === 'coaches' && currentUserType === 'admin') renderCoachesManagement();
        else if (section === 'myteam' && currentUserType === 'coach') renderMyTeam();
        else if (section === 'settings' && currentUserType === 'admin') renderSettings();
        else renderDashboard();
    });
}

// ==================== المودال ====================
function openModal(content) {
    document.getElementById('modalContent').innerHTML = content;
    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
});
    <script>
    // ==================== تحميل البيانات ====================
    function loadAllData() {
        return Promise.all([
            db.collection('teams').get().then(function(snap) {
                allTeams = [];
                snap.forEach(function(doc) { allTeams.push({ id: doc.id, ...doc.data() }); });
            }),
            db.collection('matches').get().then(function(snap) {
                allMatches = [];
                snap.forEach(function(doc) { allMatches.push({ id: doc.id, ...doc.data() }); });
            }),
            db.collection('players').get().then(function(snap) {
                allPlayers = [];
                snap.forEach(function(doc) { allPlayers.push({ id: doc.id, ...doc.data() }); });
            }),
            db.collection('coaches').get().then(function(snap) {
                allCoaches = [];
                snap.forEach(function(doc) { allCoaches.push({ id: doc.id, ...doc.data() }); });
            })
        ]);
    }

    function getTeamName(code) {
        var team = allTeams.find(function(t) { return t.code === code; });
        return team ? team.name : code;
    }

    function getTeamCode(code) {
        var team = allTeams.find(function(t) { return t.code === code; });
        return team ? team.code : code;
    }

    function getTeamColor(code) {
        var team = allTeams.find(function(t) { return t.code === code; });
        return team ? (team.color || '#0078d4') : '#0078d4';
    }

    function formatDate(dateString) {
        if (!dateString) return '';
        var parts = dateString.split('-');
        if (parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
        return dateString;
    }

    // ==================== لوحة التحكم ====================
    function renderDashboard() {
        var main = document.getElementById('mainContent');
        var today = new Date().toISOString().split('T')[0];
        var todayMatches = allMatches.filter(function(m) { return m.date === today; });
        var upcomingMatches = allMatches.filter(function(m) { return m.date > today && m.status === 'upcoming'; });
        var finishedMatches = allMatches.filter(function(m) { return m.status === 'finished'; });
        var totalGoals = finishedMatches.reduce(function(sum, m) { return sum + (m.team1Score || 0) + (m.team2Score || 0); }, 0);

        var html = '<h1 class="page-title"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</h1>';
        html += '<div class="cards-grid">';
        html += '<div class="stat-card teams" onclick="navigateTo(\'' + (currentUserType === 'admin' ? 'teams' : 'standings') + '\')">';
        html += '<div class="card-icon blue"><i class="fas fa-shield-halved"></i></div><div class="card-info"><h3>الفرق المشاركة</h3><div class="number">' + allTeams.length + '</div></div></div>';
        html += '<div class="stat-card matches" onclick="navigateTo(\'matches\')">';
        html += '<div class="card-icon green"><i class="fas fa-futbol"></i></div><div class="card-info"><h3>المباريات المكتملة</h3><div class="number">' + finishedMatches.length + '</div></div></div>';
        html += '<div class="stat-card"><div class="card-icon orange"><i class="fas fa-users"></i></div><div class="card-info"><h3>إجمالي اللاعبين</h3><div class="number">' + allPlayers.length + '</div></div></div>';
        html += '<div class="stat-card scorers" onclick="navigateTo(\'scorers\')">';
        html += '<div class="card-icon red"><i class="fas fa-medal"></i></div><div class="card-info"><h3>إجمالي الأهداف</h3><div class="number">' + totalGoals + '</div></div></div>';
        html += '</div>';

        // مباريات اليوم
        html += '<div class="section-card"><div class="section-header"><h2><i class="fas fa-calendar-day" style="color:var(--primary);"></i> مباريات اليوم</h2><span class="badge badge-info">' + todayMatches.length + ' مباريات</span></div>';
        if (todayMatches.length > 0) {
            html += '<div class="today-matches">';
            todayMatches.forEach(function(m) { html += renderMatchCard(m); });
            html += '</div>';
        } else {

    function deleteTeam(teamId) {
        if (!confirm('هل أنت متأكد من حذف هذا الفريق؟')) return;
        var team = allTeams.find(function(t) { return t.id === teamId; });
        var promises = [];
        allPlayers.filter(function(p) { return p.teamCode === team.code; }).forEach(function(p) { promises.push(db.collection('players').doc(p.id).delete()); });
        var coach = allCoaches.find(function(c) { return c.teamCode === team.code; });
        if (coach) promises.push(db.collection('coaches').doc(coach.id).delete());
        promises.push(db.collection('teams').doc(teamId).delete());
        Promise.all(promises).then(function() {
            loadAllData().then(function() { loadTeamsList(); });
            showAlert('تم حذف الفريق بنجاح!', 'success');
        }).catch(function(error) { showAlert('خطأ: ' + error.message, 'error'); });

    function renderStandingsTable(containerId) {
        var container = document.getElementById(containerId);
        if (!container) return;
        var map = {};
        allTeams.forEach(function(t) { map[t.code] = { teamCode: t.code, teamName: t.name, teamColor: t.color, played: 0, won: 0, drawn: 0, lost: 0, goalsFor: 0, goalsAgainst: 0, goalDiff: 0, points: 0 }; });
        allMatches.filter(function(m) { return m.status === 'finished'; }).forEach(function(m) {
            var t1 = map[m.team1], t2 = map[m.team2];
            if (t1 && t2) {
                t1.played++; t2.played++;
                t1.goalsFor += m.team1Score || 0; t1.goalsAgainst += m.team2Score || 0;
                t2.goalsFor += m.team2Score || 0; t2.goalsAgainst += m.team1Score || 0;
                if (m.team1Score > m.team2Score) { t1.won++; t1.points += 3; t2.lost++; }
                else if (m.team1Score < m.team2Score) { t2.won++; t2.points += 3; t1.lost++; }
                else { t1.drawn++; t2.drawn++; t1.points++; t2.points++; }
            }
        });
        var standings = Object.values(map);
        standings.forEach(function(s) { s.goalDiff = s.goalsFor - s.goalsAgainst; });
        standings.sort(function(a, b) { return b.points - a.points || b.goalDiff - a.goalDiff || b.goalsFor - a.goalsFor; });
        if (standings.length === 0) { container.innerHTML = '<div style="text-align:center;padding:40px;"><p>لا توجد بيانات كافية</p></div>'; return; }
        var html = '<table><thead><tr><th>المركز</th><th>الفريق</th><th>لعب</th><th>فاز</th><th>تعادل</th><th>خسر</th><th>له</th><th>عليه</th><th>الفارق</th><th>النقاط</th></tr></thead><tbody>';
        standings.forEach(function(s, i) {
            html += '<tr style="' + (i < 2 ? 'background:#f0fdf4;' : '') + '"><td><strong>' + (i + 1) + '</strong></td><td><div style="display:flex;align-items:center;gap:10px;"><div style="width:12px;height:12px;border-radius:50%;background:' + (s.teamColor || '#0078d4') + ';"></div><strong>' + s.teamName + '</strong></div></td>';
            html += '<td>' + s.played + '</td><td>' + s.won + '</td><td>' + s.drawn + '</td><td>' + s.lost + '</td><td>' + s.goalsFor + '</td><td>' + s.goalsAgainst + '</td>';
            html += '<td style="' + (s.goalDiff > 0 ? 'color:green;' : s.goalDiff < 0 ? 'color:red;' : '') + '">' + (s.goalDiff > 0 ? '+' : '') + s.goalDiff + '</td>';
            html += '<td style="font-weight:700;font-size:1.1rem;color:var(--primary);">' + s.points + '</td></tr>';
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // ==================== الهدافين ====================
    function renderScorers() {
        var main = document.getElementById('mainContent');
        main.innerHTML = '<div class="section-card"><div class="section-header"><h2><i class="fas fa-medal"></i> ترتيب الهدافين</h2>' +
            (currentUserType === 'admin' ? '<button class="btn btn-primary" onclick="showAddScorerModal()"><i class="fas fa-plus"></i> إضافة هدف</button>' : '') +
            '</div><div id="scorersList"><div class="loading"><i class="fas fa-spinner"></i><p>جاري التحميل...</p></div></div></div>';
        loadScorersList();
    }

    function loadScorersList() {
        var container = document.getElementById('scorersList');
        if (!container) return;
        db.collection('scorers').get().then(function(snap) {
            var map = {};
            snap.forEach(function(doc) {
                var d = doc.data();
                var key = d.playerName + '_' + d.teamCode;
                if (!map[key]) map[key] = { playerName: d.playerName, teamCode: d.teamCode, goals: 0 };
                map[key].goals += d.goals || 1;
            });
            var scorers = Object.values(map);
            scorers.sort(function(a, b) { return b.goals - a.goals; });
            if (scorers.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;"><i class="fas fa-futbol" style="font-size:3rem;margin-bottom:15px;"></i><p>لا يوجد هدافون بعد</p></div>';
                return;
            }
            var html = '<table><thead><tr><th>الترتيب</th><th>اللاعب</th><th>الفريق</th><th>عدد الأهداف</th>' + (currentUserType === 'admin' ? '<th>إجراءات</th>' : '') + '</tr></thead><tbody>';
            scorers.forEach(function(s, i) {
                html += '<tr><td>' + (i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1) + '</td><td><strong>' + s.playerName + '</strong></td><td>' + getTeamName(s.teamCode) + '</td><td style="font-weight:700;font-size:1.1rem;">' + s.goals + '</td>';
                if (currentUserType === 'admin') {
                    html += '<td><button class="btn btn-outline btn-sm" onclick="addGoalToScorer(\'' + s.playerName + '\', \'' + s.teamCode + '\')"><i class="fas fa-plus"></i></button></td>';
                }
                html += '</tr>';
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }).catch(function(err) {
            container.innerHTML = '<div style="text-align:center;padding:40px;"><p>لا يوجد هدافون بعد</p></div>';
        });
    }

    function showAddScorerModal() {
        var opts = allTeams.map(function(t) { return '<option value="' + t.code + '">' + t.name + ' (' + t.code + ')</option>'; }).join('');
        openModal('<button class="modal-close" onclick="closeModal()">✕</button><h3><i class="fas fa-plus-circle"></i> إضافة هدف للاعب</h3>' +
            '<form onsubmit="addScorer(event)"><div class="form-group"><label>اسم اللاعب *</label><input type="text" id="scorerName" required></div>' +
            '<div class="form-group"><label>الفريق *</label><select id="scorerTeam" required><option value="">اختر</option>' + opts + '</select></div>' +
            '<div class="form-group"><label>عدد الأهداف</label><input type="number" id="scorerGoals" value="1" min="1"></div>' +
            '<div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">إلغاء</button><button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button></div></form>');

    function addScorer(e) {
        e.preventDefault();

        db.collection('scorers').add({ playerName: name, teamCode: code, goals: 1, createdAt: firebase.firestore.FieldValue.serverTimestamp() })

        }).then(function() {

            loadAllData().then(function() { renderMyTeam(); });
            showAlert('تم تحديث اللاعب!', 'success');
        }).catch(function(err) { showAlert('خطأ: ' + err.message, 'error'); });

        if (!confirm('هل أنت متأكد من حذف هذا اللاعب؟')) return;
        db.collection('players').doc(playerId).delete().then(function() {
            loadAllData().then(function() { renderMyTeam(); });
            showAlert('تم حذف اللاعب!', 'success');
        }).catch(function(err) { showAlert('خطأ: ' + err.message, 'error'); });

    }

    function changeAdminPassword(e) {
        e.preventDefault();
        var cp = document.getElementById('currentPassword').value;
        var np = document.getElementById('newPassword').value;
        var conp = document.getElementById('confirmPassword').value;
        if (cp !== 'mansouriya2024') { showAlert('كلمة المرور الحالية غير صحيحة!', 'error'); return; }
        if (np !== conp) { showAlert('كلمة المرور الجديدة غير متطابقة!', 'error'); return; }
        showAlert('تم تغيير كلمة المرور بنجاح!', 'success');
        document.getElementById('currentPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
    }

    function testFirebaseConnection() {
        db.collection('teams').limit(1).get().then(function() {
            document.getElementById('dbStatus').textContent = 'متصل';
            document.getElementById('dbStatus').className = 'badge badge-success';
            showAlert('✅ الاتصال بقاعدة البيانات Firebase ناجح!', 'success');
        }).catch(function(err) {
            document.getElementById('dbStatus').textContent = 'غير متصل';
            document.getElementById('dbStatus').className = 'badge badge-danger';
            showAlert('❌ فشل الاتصال: ' + err.message, 'error');
        });
    }

    function resetAllData() {
        if (!confirm('⚠️ تحذير: سيتم حذف جميع البيانات (الفرق، اللاعبين، المباريات، المدربين، الهدافين). هل أنت متأكد؟')) return;
        if (!confirm('تأكيد نهائي: هذا الإجراء لا يمكن التراجع عنه!')) return;
        var cols = ['teams', 'players', 'matches', 'coaches', 'scorers'];
        var promises = [];
        cols.forEach(function(col) {
            promises.push(db.collection(col).get().then(function(snap) {
                var batch = db.batch();
                snap.forEach(function(doc) { batch.delete(doc.ref); });
                return batch.commit();
            }));
        });
        Promise.all(promises).then(function() {
            loadAllData().then(function() { navigateTo('dashboard'); });
            showAlert('تم إعادة تعيين جميع البيانات بنجاح!', 'success');
        }).catch(function(err) { showAlert('خطأ: ' + err.message, 'error'); });
    }

    console.log('👤 أدمن: admin / mansouriya2024');
    console.log('🔥 Firebase: smartteacherhub');
